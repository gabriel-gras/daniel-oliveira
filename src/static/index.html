<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GamePrice Comparator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: "#14171C",
            surface: "#1B1F26",
            line: "#2A2F38",
            ink: "#ECEEF1",
            muted: "#8B92A0",
            gold: "#F5A623",
            mint: "#3DD68C",
          },
          fontFamily: {
            display: ['"Chakra Petch"', "sans-serif"],
            body: ["Inter", "sans-serif"],
            mono: ['"JetBrains Mono"', "monospace"],
          },
        },
      },
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <style>
    body {
      background-color: #14171c;
      background-image: repeating-linear-gradient(0deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 3px);
    }

    /* Painel em forma de ticket perfurado: notches recortados nas bordas */
    .ticket {
      position: relative;
    }

    .ticket::before,
    .ticket::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #14171c;
      border: 1px solid #2a2f38;
      transform: translateY(-50%);
      z-index: 1;
    }

    .ticket::before {
      left: -9px;
    }

    .ticket::after {
      right: -9px;
    }

    .stamp {
      transform: rotate(-7deg);
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rise-in {
      animation: rise-in 0.35s ease-out both;
    }

    input::placeholder {
      color: #8b92a0;
    }

    .chip {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b92a0;
      background: #1b1f26;
      border: 1px solid #2a2f38;
      border-radius: 999px;
      padding: 6px 12px;
      transition: all 0.15s ease;
    }

    .chip:hover {
      color: #ecedf1;
      border-color: #f5a623;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col font-body text-ink">
  <!-- Cabeçalho -->
  <header class="border-b border-line px-6 py-4 flex items-center justify-between">
    <div class="flex items-baseline gap-2">
      <span class="font-display font-bold text-lg tracking-wide">
        GAME<span class="text-gold">PRICE</span>
      </span>
      <span class="font-mono text-[11px] text-muted uppercase tracking-widest">
        comparator
      </span>
    </div>
    <button id="back-btn"
      class="hidden font-mono text-xs uppercase tracking-wide text-muted hover:text-ink transition-colors">
      ← nova busca
    </button>
  </header>

  <!-- VIEW: HOME -->
  <main id="view-home" class="flex-1 flex flex-col items-center justify-center px-6 py-16">
    <p class="font-mono text-xs uppercase tracking-[0.3em] text-gold mb-3">
      busca de preços em tempo real
    </p>
    <h1 class="font-display font-bold text-3xl sm:text-4xl text-center mb-3">
      Compare. Economize. Jogue.
    </h1>
    <p class="text-muted text-sm font-mono mb-10">
      &gt;&gt; digite o nome de um jogo e pressione enter_
    </p>

    <form id="search-form" class="w-full max-w-xl">
      <label for="search-input" class="sr-only">Buscar jogo</label>
      <div class="flex gap-2">
        <input id="search-input" type="text" autocomplete="off" placeholder="ex: Hollow Knight" class="flex-1 bg-surface border border-line rounded-lg px-4 py-3 font-mono text-sm
                 focus:outline-none focus:border-gold focus:ring-2 focus:ring-gold/30 transition-all" />
        <button type="submit" class="bg-gold text-canvas font-mono text-xs uppercase tracking-wider font-semibold
                 rounded-lg px-5 py-3 hover:brightness-110 active:scale-[0.98] transition-all">
          escanear ⌕
        </button>
      </div>
    </form>

    <div class="flex flex-wrap gap-2 mt-5">
      <button data-chip="Hollow Knight" class="chip">Hollow Knight</button>
      <button data-chip="Hades" class="chip">Hades</button>
      <button data-chip="Stardew Valley" class="chip">Stardew Valley</button>
      <button data-chip="Elden Ring" class="chip">Elden Ring</button>
    </div>

    <p id="home-status" class="font-mono text-xs text-muted mt-8 h-4"></p>
  </main>

  <!-- VIEW: RESULTADOS -->
  <main id="view-results" class="hidden flex-1 px-6 py-10 max-w-5xl w-full mx-auto">
    <section class="grid md:grid-cols-[320px_1fr] gap-8 mb-12 rise-in md:items-center">
      <div>
        <div
          class="aspect-video bg-surface border border-line rounded-lg overflow-hidden flex items-center justify-center">
          <img id="game-cover" alt="" loading="lazy" decoding="async" class="w-full h-full object-contain hidden" />
          <svg id="game-cover-fallback" class="w-16 h-16 text-line" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5">
            <path
              d="M6 11h2m-1-1v2M14 12h.01M17 10h.01M5 8h14a2 2 0 0 1 2 2v5a3 3 0 0 1-3 3c-.8 0-1.5-.4-2-1l-1-1.5a2 2 0 0 0-1.6-.8H8.6a2 2 0 0 0-1.6.8L6 17a3 3 0 0 1-5-2v-5a2 2 0 0 1 2-2Z"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
      </div>
      </div>

      <div class="flex flex-col">
        <p class="font-mono text-[11px] uppercase tracking-widest text-muted mb-1">jogo encontrado</p>
        <h2 id="game-title" class="font-display font-bold text-2xl mb-6">—</h2>

        <!-- "Ticket" de ofertas -->
        <div class="ticket bg-surface border border-line rounded-lg overflow-hidden">
          <ul id="price-list" class="divide-y divide-dashed divide-line"></ul>
        </div>
      </div>
    </section>

    <section id="chart-section" class="rise-in">
      <p class="font-mono text-[11px] uppercase tracking-widest text-muted mb-1">histórico</p>
      <h3 class="font-display font-bold text-lg mb-4">Variação de preço</h3>
      <div class="bg-surface border border-line rounded-lg p-4">
        <canvas id="price-chart" height="110"></canvas>
      </div>
    </section>

    <p id="results-status" class="font-mono text-xs text-muted mt-6"></p>
  </main>

  <footer class="border-t border-line px-6 py-4 text-center font-mono text-[11px] text-muted uppercase tracking-widest">
    gamePrice comparator · dados podem variar conforme a loja
  </footer>

  <script src="/static/app.js"></script>
</body>

</html>
